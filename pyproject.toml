[build-system]
requires = ["setuptools>=77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "retracemem"
version = "0.1.0"
description = "Evidence-preserving reversible belief revision for dynamic agent memory."
requires-python = ">=3.10"
dependencies = [
    "python-dotenv>=1.0,<2",
    "PyYAML>=6,<7",
]

[project.optional-dependencies]
dev = []
llm = [
    "openai>=1.0",
    "anthropic>=0.25",
    "google-genai>=1.0",
]

[tool.setuptools.packages.find]
where = ["src", "."]
include = ["retracemem*", "retrace_learn*", "benchmark*"]

[tool.pyright]
include = ["benchmark", "scripts", "src"]
extraPaths = [".", "src"]
