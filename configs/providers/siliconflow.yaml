# SiliconFlow (OpenAI-compatible chat completions).
# Load with: --provider-config configs/providers/siliconflow.yaml
name: siliconflow
mode: openai-chat
base_url: https://api.siliconflow.cn/v1/chat/completions
api_key_env: SILICONFLOW_API_KEY     # value resolved from environment / .env
model: deepseek-ai/DeepSeek-V3
timeout: 60
max_retries: 2
temperature: 0.0
max_tokens: 1024
stream: false
