output_root: runs/v1.4/local_ollama_smoke
ollama_base_url_env: OLLAMA_BASE_URL
default_ollama_base_url: http://localhost:11434

benchmark:
  raw_internal_dir: scratch/data/mempatch/v1.4/raw_internal
  release_dir: scratch/data/mempatch/v1.4/release
  quotas:
    dev_calibration: 200
    main_test_synthetic: 1000
    challenge_test_hard: 300
  splits:
    - name: main_test_synthetic
      max_cases: 20
    - name: challenge_test_hard
      max_cases: 20

models:
  - deepseek-r1:32b
  - qwen3-coder:30b
  - qwen3-coder-next:latest

methods:
  - direct_json
  - mempatch

generation:
  temperature: 0
  top_p: 1
  seed: 42
  num_ctx: 8192
  response_num_predict: 1024
  action_num_predict: 768
  timeout_seconds: 240
  retries: 1
  retry_sleep_seconds: 3
  keep_alive: 5m

retrieval_k: 8
