name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Clean caches
        run: |
          rm -rf .pycache_compile .pytest_cache
          find benchmark scripts src tests -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Compile
        run: |
          env PYTHONPYCACHEPREFIX=.pycache_compile python -m compileall -q benchmark scripts src tests

      - name: Pytest
        run: |
          env PYTHONPYCACHEPREFIX=.pycache_compile PYTHONPATH=.:src python -m pytest -q

      - name: Generation registry smoke
        run: |
          PYTHONPATH=.:src python -m pytest tests/test_generation_registry.py -q

      - name: Evaluator smoke
        run: |
          python scripts/workflows/evaluate_mempatch_predictions.py \
            --data tests/fixtures/smoke_scenarios.jsonl \
            --predictions tests/fixtures/smoke_predictions.jsonl

      - name: Revision module smoke
        run: |
          python scripts/eval/run_mempatch_revision_module.py \
            --data tests/fixtures/smoke_scenarios.jsonl \
            --out-predictions /tmp/revision_module_smoke.jsonl \
            --max-cases 1 \
            --policy scripted \
            --scripted-actions tests/fixtures/scripted_noop_actions.json

      - name: Direct runner prompt stats
        run: |
          python scripts/eval/run_mempatch_model.py \
            --data tests/fixtures/smoke_scenarios.jsonl \
            --provider openai \
            --model gpt-4o-mini \
            --out-predictions /tmp/direct_prompt_stats.jsonl \
            --max-cases 1 \
            --print-prompt-stats

      - name: Revision proposer prompt stats
        run: |
          python scripts/eval/run_mempatch_revision_module.py \
            --data tests/fixtures/smoke_scenarios.jsonl \
            --out-predictions /tmp/revision_prompt_stats.jsonl \
            --max-cases 1 \
            --policy prompt \
            --provider openai \
            --model gpt-4o-mini \
            --print-prompt-stats
