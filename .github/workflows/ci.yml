name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Clean caches
        run: |
          rm -rf .pycache_compile .pytest_cache
          find benchmark scripts src tests -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Compile
        run: |
          env PYTHONPYCACHEPREFIX=.pycache_compile python -m compileall -q benchmark scripts src tests

      - name: Pytest
        run: |
          env PYTHONPYCACHEPREFIX=.pycache_compile PYTHONPATH=.:src python -m pytest -q

      - name: Evaluator smoke
        run: |
          PYTHONPATH=.:src python scripts/workflows/evaluate_mempatch_predictions.py \
            --data tests/fixtures/smoke_scenarios.jsonl \
            --predictions tests/fixtures/smoke_predictions.jsonl
