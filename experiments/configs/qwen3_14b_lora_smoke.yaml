model:
  name: Qwen/Qwen3-14B-Instruct
  backend: mlx-lm
  quantization: 4bit

data:
  train_file: local/train_data/mempatch_qwen14b_smoke/train.jsonl
  valid_file: local/train_data/mempatch_qwen14b_smoke/valid.jsonl
  hard_probe_file: local/train_data/mempatch_qwen14b_smoke/hard_probe.jsonl

training:
  max_seq_len: 2048
  train_examples: 512
  valid_examples: 64
  batch_size: 1
  grad_accum_steps: 8
  effective_batch_size: 8
  epochs: 1
  max_steps: 64
  learning_rate: 1.0e-5
  warmup_steps: 4
  weight_decay: 0.0
  seed: 2027

lora:
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - o_proj

output:
  adapter_dir: local/adapters/qwen3_14b_mempatch_smoke
  log_dir: local/logs/qwen3_14b_mempatch_smoke
  save_every: 32
  eval_every: 32

oom_fallback:
  max_seq_len: 1536
  train_examples: 256
  max_steps: 32
  lora_rank: 4
  target_modules:
    - q_proj
    - v_proj
